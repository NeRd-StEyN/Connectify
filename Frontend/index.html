<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Connectify — Real-time encrypted messaging, social feed, and friend discovery. Connect with the world around you." />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Connectify" />

    <!-- Open Graph -->
    <meta property="og:title" content="Connectify" />
    <meta property="og:description" content="Real-time encrypted messaging and social platform" />
    <meta property="og:type" content="website" />

    <link rel="icon" type="image/png" href="/icons8-chat-50.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Connectify — Chat & Connect</title>
  </head>
  <body style="background-color: #09090b; color: #f8fafc;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
