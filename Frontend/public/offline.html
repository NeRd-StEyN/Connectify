<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connectify — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body {
      background: #09090b;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 4rem; }
    h1 { font-size: 1.8rem; font-weight: 800; color: #8b5cf6; }
    p { color: #94a3b8; font-size: 1rem; max-width: 360px; line-height: 1.6; }
    button {
      margin-top: 8px;
      background: #8b5cf6;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🔌</div>
  <h1>You're offline</h1>
  <p>Connectify needs an internet connection to work. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
